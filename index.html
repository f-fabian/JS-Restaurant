<!-- index.html - main file to load game -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Burachok JS Bar</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="layout">

        <!-- Game canvas -->
        <div id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div id="moneyDisplay">$ 0</div>
            <div id="customerDisplay">👤 0</div>
        </div>

        <!-- Right panel -->
        <div id="codePanel">
            <h3 id="consolePanelTitle">Console</h3>
            <textarea id="consoleInput">
while (customers) {
    moveToCustomer();
    takeOrder();
    moveToCocktail();
    serve();
    backToInitialPosition();
    cleanTable();
}
</textarea>
            <button id="runBtn">RUN</button>
        </div>

    </div>

    <!-- Scripts load -->
    <script type="module" src="./js/main.js"></script>

</body>
</html>
